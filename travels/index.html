<html>

    <center><h2><br><br>纸上得来终觉浅，绝知此事要躬行。 ——陆游</h2></center>
    <body>

        <div id="main"></div>
        <script src="http://api.map.baidu.com/api?v=2.0&ak=Od3OyIXbigd4t28ek2UwFyeFDsrgThAG"></script>

        <script src="/js/echarts.min.js"></script>
        <script type="text/javascript" src="/js/china.js"></script>
    </body>

	<script>
      var myChart = echarts.init(document.getElementById('main'));

var data = [
        {name: '济南', value: ['09/15/2013 ~ 06/15/2020', '在山大度过的七年大学和研究生时光。']},
        {name: '枞阳', value: ['12/16/1996', '我出生的地方，一个江边小城。',
                              '09/01/2007 ~ 07/01/2010', '在老洲镇我度过了短暂的三年初中时光。',
                              '09/01/2010 ~ 07/01/2013', '我考上了我们县最好的省级示范高中——浮山中学。']},
        {name: '温州', value: ['09/01/2001 ~ 07/01/2007', '作为害群之马的小学阶段。']},
        {name: '青岛', value: ['xx/xx/xxxx ~ xx/xx/xxxx', '旅游，第一次看海，在金沙滩']},
        {name: '阜阳', value: ['12/xx/2015 ~ xx/xx/2018', '她大学在的城市，这里有我关于美好的所有回忆。']},
        {name: '威海', value: ['xx/xx/xxxx ~ xx/xx/xxxx', '美丽的沿海公路，难忘的骑行。']},
        {name: '烟台', value: ['xx/xx/xxxx ~ xx/xx/xxxx', '一座仙气缥缈的城市。']},
        {name: '北京', value: ['xx/xx/xxxx ~ xx/xx/xxxx', '来过无数次，却始终喜欢不上的感觉。对了，她在这读的研究生。']},
        {name: '天津', value: ['xx/xx/xxxx ~ xx/xx/xxxx', '和她第一次一起旅游，她说这是她最难忘的日子。']},
        {name: '台北', value: ['09/21/2019 ~ 09/26/2019', '第一次发表论文出境开会（ICIP 2019）。去完台北故宫博物院不禁感叹：原来文物也可以如此完美无缺。']},
        {name: '广州', value: ['07/24/2021 ~ 07/26/2021', '出发远赴美国求学。']},
        {name: '苏州', value: ['xx/xx/xxxx ~ xx/xx/xxxx', '山大软件学院统一组织的见识实习。']},
        {name: '张家港', value: ['xx/xx/xxxx ~ xx/xx/xxxx', '入选"莘莘学子看港城"校政企联合参观学习活动，进行为期三天的游学。']},
        {name: '南京', value: ['08/16/2018 ~ 08/19/2018', '参加 ICIMCS 2018，第一次做英文演讲。']},
        {name: '杭州', value: ['xx/xx/xxxx ~ xx/xx/xxxx', '陪她参加应聘中学老师的面试，顺便一起旅游。']},
        {name: '无锡', value: ['xx/xx/xxxx ~ xx/xx/xxxx', '她工作的地方，无锡市新吴区后宅中学。']},
        {name: '上海', value: ['xx/xx/xxxx ~ xx/xx/xxxx', '苏州见习完顺便去了趟魔都。']},
        {name: '沧州', value: ['10/01/2018 ~ 10/02/2018', '参加大学下铺于越的婚礼。']},
        {name: '聊城', value: ['06/05/2021 ~ 06/06/2021', '参加隔壁寝室王华栋的婚礼。']},
        {name: '合肥', value: ['08/20/2018 ~ 08/30/2018', '参加表哥许彦的婚礼，第一次当伴郎。依稀记得第一次来合肥好像是参加浙大的自主招生考试，时间已不可考。']},

        // {name: '老洲', value: ['09/01/2007 ~ 07/01/2010', '初中时光。']},
        // {name: '浮山', value: ['09/01/2010 ~ 07/01/2013', '我考上了我们县最好的高中——浮山中学。']}
];

// https://echarts.apache.org/v4/examples/en/editor.html?c=effectScatter-bmap
var geoCoordMap = {
    '枞阳': [117, 31.38],
    '温州': [120.65,28.01],
    '济南': [117,36.65],
    '苏州': [120.7, 31.3],
    '上海': [121.50, 31.24],
    '青岛':[120.33,36.07],
    // '老洲': [117.72,30.86],
    // '浮山': [117.3,30.9],
    '威海': [122.15, 37.45],
    '烟台': [121.41, 37.55],
    '阜阳': [115.79, 32.90],
    '北京': [116.40, 39.92],
    '张家港': [120.56, 31.88],
    '天津': [117.22, 39.14],
    '南京': [118.96, 32.125],
    '合肥': [117.3, 31.8],
    '台北': [121.575, 25.037],
    '沧州': [116.85, 38.31],
    '杭州': [120.04, 30.37],
    '聊城': [115.95, 36.47],
    '无锡': [120.50, 31.49],
    '广州': [113.31, 23.40],
};

var convertData = function (data) {
    var res = [];
    for (var i = 0; i < data.length; i++) {
        var geoCoord = geoCoordMap[data[i].name];
        if (geoCoord) {
            res.push({
                name: data[i].name,
                value: geoCoord.concat(data[i].value)
            });
            //console.log(res)
        }
    }
    return res;
};

option = {
    // backgroundColor: '#404a59',
    title: {
    },
    tooltip: {
        trigger: 'item',
        padding: 10,
        backgroundColor: '#222',
        borderColor: '#777',
        borderWidth: 1,
        formatter: function (params) {
            if (params.name == '枞阳') {
                name = params.name
                time_1 = params.value[2]
                describe_1 = params.value[3]
                time_2 = params.value[4]
                describe_2 = params.value[5]
                time_3 = params.value[6]
                describe_3 = params.value[7]
                return '<div style="border-bottom: 1px solid rgba(255,255,255,.3); font-size: 20px;padding-bottom: 7px;margin-bottom: 7px">'
                    + name
                    + '</div>'
                    + time_1
                    + '<br>'
                    + describe_1
                    + '<br>'
                    + time_2
                    + '<br>'
                    + describe_2
                    + '<br>'
                    + time_3
                    + '<br>'
                    + describe_3;
            } else {
                name = params.name
                time = params.value[2]
                describe = params.value[3]
                return '<div style="border-bottom: 1px solid rgba(255,255,255,.3); font-size: 20px;padding-bottom: 7px;margin-bottom: 7px">'
                    + name
                    + '</div>'
                    + time
                    + '<br>'
                    + describe;
            }

        }
    },
    geo: {
        map: 'china',
        label: {
            emphasis: {
                show: true
            },
            position: 'inside',
            color: '#d91818',
            fontSize: 18,
        },
        roam: true, //'scale', 'move',
        itemStyle: {
            normal: {
                areaColor: '#e0b3b3',
                borderColor: '#111'
            },
            emphasis: {
                areaColor: '#9b6969'
            }
        }
    },
    series : [
        {
            name: '足迹',
            type: 'effectScatter',
            coordinateSystem: 'geo',
            data: convertData(data),
            symbolSize: 10,
            showEffectOn: 'render',
            rippleEffect: {
                brushType: 'stroke'
            },
            hoverAnimation: true,
            label: {
                normal: {
                    formatter: '{b}',
                    position: 'right',
                    fontSize: 10,
                    show: true
                }
            },
            itemStyle: {
                normal: {
                    color: '#104aa2',
                    shadowBlur: 5,
                    shadowColor: '#333'
                }
            },
            zlevel: 1
        }
    ]
};

myChart.setOption(option);
    </script>
</html>
